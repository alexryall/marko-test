app = 'marko-test'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  memory = '2048mb'
  cpu_kind = 'performance'
  cpus = 1

[deploy]
  release_command = 'php bin/setup-db.php'
